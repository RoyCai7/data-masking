version: '3.8'

services:
  backend:
    build: ./backend
    container_name: masking-backend
    ports:
      - "8000:8000"
    environment:
      - MAX_WORKERS=16
      - PYTHONUNBUFFERED=1
      - AUTH_ENABLED=true
    volumes:
      - masking-data:/tmp/masking-service
      - ./backend/keys.json:/app/keys.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: masking-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  masking-data:
