version: '3.8'

services:
  backend:
    build: ./backend
    container_name: masking-backend
    expose:
      - "8000"
    environment:
      - MAX_WORKERS=16
      - PYTHONUNBUFFERED=1
      - AUTH_ENABLED=true
      - RULES_DB_PATH=/app/data/rules.db
    volumes:
      - masking-data:/tmp/masking-service
      - rules-data:/app/data
      - ./backend/keys.json:/app/keys.json:ro
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: masking-frontend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  masking-data:
  rules-data:
